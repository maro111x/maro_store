<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>maro store - ممنوع</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap');
*{margin:0;padding:0;font-family:'Cairo';cursor:crosshair;}
body{background:#000;overflow-x:hidden;color:#ff0000;}
/* شاشة تشويش اول الدخول */
#intro{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;animation:fadeOut 2s 1s forwards;}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}
.glitch-text{font-size:80px;color:#ff0000;text-align:center;margin-top:40vh;animation:glitch 0.2s infinite;}
@keyframes glitch{0%{text-shadow:2px 0 red;}25%{text-shadow:-2px 0 cyan;}50%{text-shadow:2px 0 lime;}}

/* العين بتتابعك */
.eye{position:fixed;width:200px;height:200px;border:5px solid red;border-radius:50%;box-shadow:0 0 50px red;pointer-events:none;z-index:1000;transition:0.1s;}

/* الكروت بتطلع من الظلمة */
.product{opacity:0;transform:translateY(50px);animation:reveal 1s forwards;border:3px solid red;background:#0a0a0a;padding:20px;margin:15px;width:280px;display:inline-block;}
@keyframes reveal{to{opacity:1;transform:translateY(0);}}
.product:nth-child(1){animation-delay:0.3s}
.product:nth-child(2){animation-delay:0.5s}
.product:nth-child(3){animation-delay:0.7s}

/* دم بينقط */
.blood{position:fixed;top:-50px;width:4px;height:80px;background:linear-gradient(transparent,red);animation:drop 3s infinite;}
@keyframes drop{to{top:100vh;opacity:0;}}
</style>
</head>
<body>

<div id="intro"><div class="glitch-text">WARNING</div></div>
<div class="eye" id="eye"></div>

<script>
// العين بتتابع الماوس
document.addEventListener('mousemove',e=>{
  document.getElementById('eye').style.left=e.clientX-100+'px';
  document.getElementById('eye').style.top=e.clientY-100+'px';
});
// دم بينقط
for(let i=0;i<15;i++){
  let b=document.createElement('div');b.className='blood';
  b.style.left=Math.random()*100+'%';b.style.animationDelay=Math.random()*3+'s';
  document.body.appendChild(b);
}
</script>

<h1 style="text-align:center;font-size:60px;margin:40px;text-shadow:0 0 30px red;">💀 maro store 💀</h1>

<div style="text-align:center;">
<div class="product"><h3>PUBG 60 UC</h3><div style="font-size:28px;">85 جنيه</div></div>
<div class="product"><h3>Free Fire 560</h3><div style="font-size:28px;">230 جنيه</div></div>
<div class="product"><h3>FC 1070 نقطة</h3><div style="font-size:28px;">500 جنيه</div></div>
<div class="product"><h3>Valorant 1000VP</h3><div style="font-size:28px;">350 جنيه</div></div>
</div>

<a href="https://wa.me/201022585692" style="background:#25D366;color:#000;padding:25px 60px;font-size:28px;border-radius:15px;text-decoration:none;font-weight:900;">اطلب واتساب 01022585692</a>
</div>

</body>
</html>
