<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>MARO STOR</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=900&family=Cairo:wght=800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030303;color:#fff;font-family:'Cairo';overflow-x:hidden}
nav{position:fixed;top:20px;left:50%;transform:translateX(-50%);display:flex;gap:30px;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);padding:15px 40px;border-radius:50px;border:1px solid #ff0033;z-index:1000}
nav a{color:#fff;text-decoration:none;font-weight:900;transition:0.3s}
nav a:hover{color:#ff0033;transform:scale(1.1)}
.hero{height:100vh;display:flex;align-items:center;justify-content:space-between;padding:0 10%;background:radial-gradient(circle at 50% 50%, #1a0005, #030303)}
.robot{width:400px;height:400px;background:url('https://i.imgur.com/JqYeZ9y.png') center/contain no-repeat;filter:drop-shadow(0 0 30px #ff0033);animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.hero-text h1{font-family:'Orbitron';font-size:70px;background:linear-gradient(90deg,#ff0033,#ff6600,#ff0033);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-text p{font-size:22px;margin:20px 0;color:#aaa}
.btn{background:#ff0033;color:#000;border:none;padding:15px 40px;border-radius:10px;font-size:20px;font-weight:900;cursor:pointer;transition:0.3s;box-shadow:0 0 20px #ff0033}
.btn:hover{background:#fff;box-shadow:0 0 40px #fff}
.section{padding:100px 10%}
h2{text-align:center;font-size:45px;margin-bottom:50px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:30px}
.card{background:#0a0a0a;border:2px solid #222;border-radius:20px;padding:30px;text-align:center;transition:0.4s}
.card:hover{border-color:#ff0033;transform:translateY(-10px);box-shadow:0 10px 30px rgba(255,0,51,0.3)}
.price{color:#ff0033;font-size:35px;font-weight:900;margin:15px 0}
</style>
</head>
<body>

<audio id="tick" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<nav>
  <a onclick="s()">PUBG</a>
  <a onclick="s()">FREE FIRE</a>
  <a onclick="s()">VALORANT</a>
  <a onclick="s()">CONTACT</a>
</nav>

<section class="hero">
  <div class="hero-text">
    <h1>MARO STOR</h1>
    <p>شحن فوري لجميع الألعاب<br>اسرع من البرق ⚡</p>
    <button class="btn" onclick="s();window.open('https://wa.me/201022585692')">اطلب دلوقتي</button>
  </div>
  <div class="robot"></div>
</section>

<section class="section">
  <h2>PUBG UC</h2>
  <div class="cards">
    <div class="card">
      <h3>60 UC</h3>
      <div class="price">85 جنيه</div>
      <button class="btn" onclick="s();order('60 UC')">اطلب</button>
    </div>
    <div class="card">
      <h3>660 UC</h3>
      <div class="price">870 جنيه</div>
      <button class="btn" onclick="s();order('660 UC')">اطلب</button>
    </div>
  </div>
</section>

<script>
const audio = document.getElementById('tick');
function s(){audio.currentTime=0;audio.play()}
function order(x){window.open(`https://wa.me/201022585692?text=عايز ${x}`)}
</script>
</body>
</html>
